<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="h-screen flex items-center justify-center bg-cover bg-center" 
      style="background-image: url('https://static.vecteezy.com/system/resources/previews/006/906/948/large_2x/doctor-with-stethoscope-in-hand-on-hospital-background-photo.jpg');">

  <!-- Login Box -->
  <div class="w-full max-w-md bg-white bg-opacity-90 rounded-lg shadow-lg p-8">
    
    <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Log In Below</h2>
    
    <form class="space-y-4">
      <!-- Email -->
      <div class="flex items-center space-x-2 border-b border-gray-300 py-1">
        <span class="text-yellow-400 text-xl">📧</span>
        <input type="email" placeholder="Email" class="w-full focus:outline-none px-2 py-1">
      </div>

      <!-- Password -->
      <div class="flex items-center space-x-2 border-b border-gray-300 py-1">
        <span class="text-yellow-400 text-xl">🔑</span>
        <input type="password" placeholder="Password" class="w-full focus:outline-none px-2 py-1">
      </div>

      <!-- Login Button -->
      <button type="submit" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-semibold py-2 rounded mt-4">
        LOGIN &gt;
      </button>
    </form>

    <!-- Links -->
    <div class="flex justify-between mt-4 text-sm text-gray-600">
      <a href="#" class="hover:text-blue-500">Sign Up</a>
      <a href="#" class="hover:text-blue-500">Forgot Password?</a>
    </div>

  </div>

</body>
</html>
