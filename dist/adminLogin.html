<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen w-screen bg-cover bg-center bg-no-repeat flex items-center justify-center"
style="background-image:url('https://thumbs.dreamstime.com/b/admin-login-sign-made-wood-table-209534886.jpg')">

<!-- LOGIN BOX -->
<div class="text-center text-black w-80">

<h2 class="text-xl font-bold mb-4 pb-2 inline-block border-b-2 border-red-800 w-32 text-center">
Login Page
</h2>

<div class="w-80 border border-gray-500 p-6 rounded-xl">

<p class="mb-6 text-lg font-semibold">Have an account?</p>

<form class="space-y-4">

<input type="text" placeholder="Username"
class="w-full px-4 py-2 rounded-full bg-lime-400  hover:bg-lime-500 text-white placeholder-white outline-none">

<input type="password" placeholder="Password"
class="w-full px-4 py-2 rounded-full bg-indigo-400  hover:bg-indigo-600 text-white placeholder-white outline-none">

<button
class="w-full py-2 rounded-full bg-orange-100 text-black font-semibold hover:bg-orange-300">
SIGN IN
</button>

</form>

<div class="flex justify-between text-sm mt-3 text-white">
<label class="flex items-center gap-1">
<input type="checkbox">
Remember Me
</label>

<a href="#">Forgot Password</a>
</div>

<p class="mt-6 text-sm">— Or Sign In With —</p>

<div class="flex justify-center gap-4 mt-3">

<button class="bg-emerald-600 text-black px-4 py-1 rounded">
Facebook
</button>

<button class="bg-fuchsia-700 text-black px-4 py-1 rounded">
Twitter
</button>

</div>

</div>
</div>
</body>
</html>
