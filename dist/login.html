<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login Page</title>
</head>

    <!-- Login Page -->
<body class="font-[Times_New_Roman] bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-lg shadow-lg w-80">
  <h2 class="font-bold text-2xl text-blue-600 text-center mb-6">Login Page</h2>
    <form>
        <label class="block mb-1">Email address</label>
        <input 
        type="text" 
        placeholder="Enter Email"
        class="w-full border border-gray-300 p-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400">

        <label class="block mb-1">Password</label>
        <input 
        type="password" 
        placeholder="Enter Password"
        class="w-full border border-gray-300 p-2 rounded mb-6 focus:outline-none focus:ring-2 focus:ring-blue-400">

        <button 
        type="submit"
        class="w-full bg-blue-700 text-white p-2 rounded hover:bg-blue-800">
        Login
        </button>
    </form>
  </div>
</body>
</html>
